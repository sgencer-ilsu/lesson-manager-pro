<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>S.Gencer Ders Takip Web</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand"><div class="logo">S</div><div><b>S.Gencer</b><span>Ders Takip</span></div></div>
      <button class="nav active" data-view="dashboard">Dashboard</button>
      <button class="nav" data-view="students">Öğrenciler</button>
      <button class="nav" data-view="planned">Planlanan</button>
      <button class="nav" data-view="lessons">Dersler</button>
      <button class="nav" data-view="settings">Ayarlar</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSub">Derslerini ve genel durumu gör.</p>
        </div>
        <div class="topActions">
          <button id="refreshBtn" class="ghost">Yenile</button>
          <button id="addBtn" class="primary">Yeni</button>
        </div>
      </header>

      <section id="setupCard" class="setup card hidden">
        <h2>İlk kurulum</h2>
        <p>Supabase bilgilerini bir kez gir. Bunlar sadece bu tarayıcıda saklanır. <b>Database password girme.</b></p>
        <div class="setupGrid">
          <label>Supabase Project URL<input id="setupUrl" placeholder="https://xxxxx.supabase.co"></label>
          <label>Supabase anon public key<input id="setupKey" placeholder="eyJ..."></label>
        </div>
        <button id="saveSetup" class="primary">Kaydet ve Devam Et</button>
        <p class="muted small">Not: Eğer veriler gelmezse Supabase SQL Editor'da zip içindeki <b>04_quick_web_access.sql</b> dosyasını çalıştır.</p>
      </section>

      <section id="content"></section>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modalBox">
      <div class="modalHead"><h2 id="modalTitle"></h2><button id="closeModal" class="iconBtn">×</button></div>
      <form id="modalForm" class="form"></form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
